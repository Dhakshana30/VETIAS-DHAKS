<input type="text" id="studentName">


<button onclick="saveData()">
    save
</button>

<button onclick="getData()">
    get Data
</button>

<p id="result"></p>

<script>
    function saveData(){
        let name=
          document.getElementById(
            "studentName"
          ).value; // name = VET
        localStorage.setItem(
            "student",
            name
        );

        alert("Data Saved");

    }

    function getData(){

        let student=
           localStorage.getItem(
            "student"
           ); // student =VET

        document.getElementById("result")
        .innerHTML=student;


    }
</script>
